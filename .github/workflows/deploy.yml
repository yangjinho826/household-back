name: Deploy to Lightsail

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: household-back
  GHCR_REPOSITORY: ghcr.io/yangjinho826/household-back

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: |
          echo "IMAGE_TAG=$(date +'%Y%m%d%H%M%S')-${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:latest .

      - name: Tag Docker image
        run: |
          docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.GHCR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.GHCR_REPOSITORY }}:latest

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to GHCR
        run: |
          docker push ${{ env.GHCR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.GHCR_REPOSITORY }}:latest

      - name: Deploy to Lightsail via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -e
            cd ~/household-back
            git pull origin main
            docker compose pull app
            docker compose up -d --remove-orphans
            docker image prune -af --filter "until=24h"

      - name: Verify deployment
        run: echo "✅ Backend deployed — image ${{ env.GHCR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
