services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:17-alpine
    container_name: household-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Seoul
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./ddl:/docker-entrypoint-initdb.d
    # 외부 노출 X — app 컨테이너가 도커 네트워크로 접근. 디버깅 시 임시로 ports 추가.
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── FastAPI ──
  app:
    image: "${DOCKER_IMAGE_NAME}:latest"
    container_name: "${DOCKER_CONTAINER_NAME}"
    # 외부 노출 X — nginx 가 도커 네트워크(household-net)로 접근
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      TZ: Asia/Seoul
      # 시세/환율 자동 갱신 스케줄러 — 단일 인스턴스 운영이라 안전. 다중 워커여도 advisory lock 으로 보호.
      SCHEDULER_ENABLED: "true"
    networks:
      - backend
      - household-net
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped

networks:
  backend:
  household-net:
    external: true

volumes:
  pgdata:
